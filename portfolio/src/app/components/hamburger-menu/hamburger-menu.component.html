<section id="hamburger-menu" [@hamburgerMenuAnimation]="isMenuOpened ? 'end' : 'start'">
  <div id="hamburger-menu-title">
    <h2 [@hamburgerMenuTextAnimation]="textInMenu ? 'end' : 'start'">Menu</h2>
  </div>
  <nav>
    <a [@hamburgerMenuTextAnimation]="textInMenu ? 'end' : 'start'" routerLink="" [fragment]="'explore-image'" [ngClass]="{'active-link': currentSection === 'explore'}">Home</a>
    <a [@hamburgerMenuTextAnimation]="textInMenu ? 'end' : 'start'" routerLink="" [fragment]="'about-me'" [ngClass]="{'active-link': currentSection === 'about'}">About</a>
    <a [@hamburgerMenuTextAnimation]="textInMenu ? 'end' : 'start'" routerLink="" [fragment]="'services'" [ngClass]="{'active-link': currentSection === 'services'}">Services</a>
    <a [@hamburgerMenuTextAnimation]="textInMenu ? 'end' : 'start'" routerLink="" [fragment]="'experience'" [ngClass]="{'active-link': currentSection === 'experience'}" >Experience</a>
    <a [@hamburgerMenuTextAnimation]="textInMenu ? 'end' : 'start'" routerLink="" [fragment]="'projects'" [ngClass]="{'active-link': currentSection === 'projects'}">Projects</a>
    <a [@hamburgerMenuTextAnimation]="textInMenu ? 'end' : 'start'" routerLink="" [fragment]="'get-in-touch'" [ngClass]="{'active-link': currentSection === 'touch'}" >Contact</a>
  </nav>
</section>
